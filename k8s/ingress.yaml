apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mkjs-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - mkjs.example.com
    secretName: mkjs-tls-secret
  rules:
  - host: mkjs.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mkjs-service
            port:
              number: 80
